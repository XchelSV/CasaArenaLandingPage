<div class="card">
    <div class="image-shell">
      <div class="image-frame" [class.loaded]="imageLoaded">
        <img
          [src]="cdnUrl + imagePath"
          [class.loaded]="imageLoaded"
          (load)="onImageLoad()"
          class="product-image"
          alt="product-image"
          loading="lazy"
          decoding="async"
        >
      </div>
    </div>
    <div class="card-body">
      <h5 class="card-title">{{title}}</h5>
      <p class="card-text">{{description}}</p>
      <label class="product-card__presentation-label" [attr.for]="'presentation-' + productId">
        Presentación
      </label>
      <select
        class="form-select rounded-0 product-card__presentation-select"
        [id]="'presentation-' + productId"
        [value]="selectedPresentationId"
        (change)="onPresentationChange($any($event.target).value)">
        @for (presentation of presentations; track presentation.id) {
          <option [value]="presentation.id">
            {{ presentation.label }} · $ {{ presentation.price | number : '1.2-2' }}
          </option>
        }
      </select>
      <button
        type="button"
        class="btn btn-outline-secondary rounded-0 product-card__button"
        [class.product-card__button--added]="addedToCart"
        (click)="addToCart()">
        <span class="product-card__check" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512">
            <path d="M438.6 105.4c12.5 12.5 12.5 32.8 0 45.3l-256 256c-12.5 12.5-32.8 12.5-45.3 0l-128-128c-12.5-12.5-12.5-32.8 0-45.3s32.8-12.5 45.3 0L160 338.7 393.4 105.4c12.5-12.5 32.8-12.5 45.2 0z"/>
          </svg>
        </span>
        <span class="product-card__label">{{ addedToCart ? 'Agregado' : 'Agregar al carrito' }}</span>
      </button>
    </div>
    <!--<div class="card-footer text-muted">
      @if (selectedPresentation; as presentation) {
        $ {{ presentation.price | number : '1.2-2' }} / {{ presentation.volumeLabel }}
      }
    </div>-->
</div>
